<!doctype html>
<html>
  <head>
    <title>Endurace Race Catalog | Home</title>
    <meta name="description" content="A Catalog of Shows Set in Los Angeles" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Endurance Race Catalog</h1>
    </header>
    <div id="search-container">
  <input type="text" id="search-bar" placeholder="Search races..." onkeyup="searchRaces()"/>
</div>
<div id="sort-container">
  <select onchange="sortRaces(this.value)">
    <option value="default">Sort by Difficulty</option>
    <option value="easiest">Easiest First</option>
    <option value="hardest">Hardest First</option>
  </select>
</div>
  <div id="filter-container">
  <button onclick="filterRaces('All')">All</button>
  <button onclick="filterRaces('Triathlon')">Triathlon</button>
  <button onclick="filterRaces('Marathon')">Marathon</button>
  <button onclick="filterRaces('Cycling')">Cycling</button>
  <button onclick="filterRaces('Ultra')">Ultra</button>
</div>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>TV Show Title</h2>
        <img src="" alt="TV Show Poster" />
        <ul>
          <li>Bullet Point 1</li>
          <li>Bullet Point 2</li>
          <li>Bullet Point 3</li>
        </ul>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
